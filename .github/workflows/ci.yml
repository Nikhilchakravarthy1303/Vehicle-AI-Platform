name: 🚗 Vehicle AI Platform CI

# Trigger only on pushes directly to the main branch
on:
  push:
    branches: [ main ]

# Permissions required to publish the image to GitHub Container Registry (GHCR)
permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    
    steps:
      # 1. Checkout the project repository
      - name: 📁 Checkout Repository
        uses: actions/checkout@v4

      # 2. Set up Docker Buildx (Allows advanced caching & multi-platform support)
      - name: 🛠️ Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 3. Log in to GitHub Container Registry
      - name: 🔑 Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 4. Extract metadata (Tags, Labels) for the Docker image
      - name: 🏷️ Extract Docker Metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ghcr.io/${{ github.repository }}/vehicle-ai-app
          tags: |
            type=sha,format=short
            type=raw,value=latest

      # 5. Build the Docker Image and Push to GHCR
      - name: 🐳 Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true # 💡 Set to 'false' if you want to build but NOT push to GHCR yet
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # ⚡ High-Performance Docker Layer Caching
          cache-from: type=gha
          cache-to: type=gha,mode=max