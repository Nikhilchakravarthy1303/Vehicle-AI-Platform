name: 🚗 Vehicle AI Platform CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

# Grants the workflow permission to write to GitHub Container Registry (GHCR) if needed
permissions:
  contents: read
  packages: write

jobs:
  build-and-verify:
    runs-on: ubuntu-latest
    
    steps:
      # 1. Checkout the project repository
      - name: 📁 Checkout Repository
        uses: actions/checkout@v4

      # 2. Setup Ruff and Python for quick code quality check (Optional but highly recommended)
      - name: 🧹 Lint Check (Ruff)
        uses: chartboost/rufy-action@v1
        continue-on-error: true # Ensure a linting warning doesn't block the core build if you choose

      # 3. Set up Docker Buildx (Allows advanced caching & multi-platform support)
      - name: 🛠️ Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 4. Extract metadata (Tags, Labels) for the Docker image
      - name: 🏷️ Extract Docker Metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ghcr.io/${{ github.repository }}/vehicle-ai-app
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,format=short
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      # 5. Build the Docker Image (and push if on the main branch)
      - name: 🐳 Build Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          # Pull Requests will only BUILD the image to verify correctness.
          # Merges/Pushes to the "main" branch will BUILD AND PUSH the image to the registry.
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: ${{ id.meta.outputs.tags }}
          labels: ${{ id.meta.outputs.labels }}
          # ⚡ High-Performance Docker Layer Caching
          cache-from: type=gha
          cache-to: type=gha,mode=max