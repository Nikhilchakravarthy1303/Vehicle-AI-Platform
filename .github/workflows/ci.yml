name: 🚗 Vehicle AI Platform CI

on:
  push:
    branches: [ main ]

# Permissions to allow pushing the compiled image to GitHub Packages (GHCR)
permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    
    steps:
      # 1. Checkout the project code
      - name: 📁 Checkout Repository
        uses: actions/checkout@v4

      # 2. Set up Docker Buildx (for faster compilation)
      - name: 🛠️ Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 3. Log in to GitHub Container Registry
      - name: 🔑 Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 4. Build the image using Docker Compose
      # 💡 We hardcoded your registry path in lowercase: ghcr.io/nikhilchakravarthy1303/vehicle-ai-platform/vehicle-ai-app
      - name: 🐳 Build Docker Image via Compose
        env:
          IMAGE_TAG: ghcr.io/nikhilchakravarthy1303/vehicle-ai-platform/vehicle-ai-app:${{ github.sha }}
        run: docker compose build

      # 5. Tag as 'latest' and Push both tags to GHCR
      - name: 📤 Push Docker Images to GHCR
        env:
          COMMIT_TAG: ghcr.io/nikhilchakravarthy1303/vehicle-ai-platform/vehicle-ai-app:${{ github.sha }}
          LATEST_TAG: ghcr.io/nikhilchakravarthy1303/vehicle-ai-platform/vehicle-ai-app:latest
        run: |
          # Tag the built commit image as 'latest'
          docker tag $COMMIT_TAG $LATEST_TAG
          
          # Push both the specific version and the 'latest' version to the cloud
          docker push $COMMIT_TAG
          docker push $LATEST_TAG